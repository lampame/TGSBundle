name: Build GramJS Bundle

on:
  schedule:
    - cron: '0 3 * * *'  # щодня о 03:00 UTC
  workflow_dispatch:      # ручний запуск

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install & Build
        run: |
          git clone https://github.com/gram-js/gramjs.git gramjs
          cd gramjs
          npm ci
          NODE_ENV="production" npx webpack
          cp browser/gramjs.js ../telegram.js
          cd ..

      - name: Minify Bundle
        run: |
          npm install -g terser
          terser telegram.js --compress --mangle -o telegram.min.js

      - name: Commit & Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add telegram.js telegram.min.js
          git diff --staged --quiet || git commit -m "Build: $(date +%Y-%m-%d)"
          git push
