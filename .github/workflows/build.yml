name: Build GramJS Bundle

on:
  schedule:
    - cron: '0 3 * * *'  # щодня о 03:00 UTC
  workflow_dispatch:      # ручний запуск

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install & Build
        run: |
          npm ci
          npm run build

      - name: Commit & Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add telegram.js telegram.min.js
          git diff --staged --quiet || git commit -m "Build: $(date +%Y-%m-%d)"
          git push
